<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Research report · OTOS Continuity™</title>
<style>
  :root{
    --ink:#20242b; --ink-soft:#3f454e; --muted:#6b7280; --faint:#9aa1ab;
    --paper:#ffffff; --bg:#f4f1ec; --rule:#e4ddd1; --rule-soft:#efe9df;
    --accent:#b5651d; --accent-ink:#9a5316; --accent-wash:#f6ecdf;
    --serif:'Iowan Old Style','Palatino Linotype','Georgia',serif;
    --sans:'Inter','Helvetica Neue',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{font-family:var(--sans);color:var(--ink);line-height:1.62;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px;margin:0 auto;padding:38px 30px 90px;}
  .topbar{max-width:820px;margin:0 auto;padding:14px 30px 0;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;}
  .src-badge{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-wash);padding:5px 11px;border-radius:999px;}
  .dl{font-size:12px;font-weight:700;text-decoration:none;color:var(--paper);background:var(--accent-ink);padding:7px 14px;border-radius:7px;}
  .dl:hover{background:var(--accent);}
  .doc{background:var(--paper);border:1px solid var(--rule);border-radius:12px;padding:44px 52px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .doc h1{font-family:var(--serif);font-size:29px;font-weight:600;line-height:1.18;letter-spacing:-.01em;margin:0 0 6px;}
  .doc h2{font-family:var(--serif);font-size:20px;font-weight:600;margin:34px 0 10px;padding-top:16px;border-top:1px solid var(--rule-soft);}
  .doc h3{font-size:15px;font-weight:700;margin:24px 0 6px;color:var(--ink);}
  .doc h4{font-size:13px;font-weight:700;margin:18px 0 4px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .doc p{margin:0 0 13px;color:var(--ink-soft);font-size:15px;text-wrap:pretty;}
  .doc ul,.doc ol{margin:0 0 14px;padding-left:22px;color:var(--ink-soft);font-size:15px;}
  .doc li{margin:0 0 5px;}
  .doc a{color:var(--accent-ink);}
  .doc strong{color:var(--ink);}
  .doc blockquote{margin:14px 0;padding:8px 16px;border-left:3px solid var(--accent);background:var(--accent-wash);border-radius:0 6px 6px 0;color:var(--ink-soft);}
  .doc code{background:#f1ece3;padding:1px 5px;border-radius:4px;font-size:13px;}
  .doc pre{background:#f7f3ec;border:1px solid var(--rule-soft);border-radius:8px;padding:14px 16px;overflow-x:auto;font-size:13px;}
  .doc pre code{background:none;padding:0;}
  .doc table{border-collapse:collapse;width:100%;margin:16px 0;font-size:13.5px;}
  .doc th,.doc td{border:1px solid var(--rule);padding:7px 10px;text-align:left;vertical-align:top;}
  .doc th{background:var(--accent-wash);font-weight:700;color:var(--ink);}
  .doc tr:nth-child(even) td{background:#faf7f2;}
  .doc hr{border:none;border-top:1px solid var(--rule);margin:26px 0;}
  .doc img{max-width:100%;height:auto;border-radius:6px;}
  .loading,.err{max-width:820px;margin:40px auto;padding:0 30px;color:var(--muted);font-size:14px;}
  .err{color:#a33;}
  .provenance{max-width:820px;margin:20px auto 0;padding:0 30px;font-size:11.5px;color:var(--faint);line-height:1.5;}
</style>
</head>
<body>
<div class="topbar">
  <span class="src-badge">OTOS research archive</span>
  <a class="dl" id="dl" href="#" download>Download source (.md)</a>
</div>
<div class="wrap"><div class="doc" id="doc"><div class="loading">Loading report…</div></div></div>
<div class="provenance" id="prov"></div>
<script type="module">
import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.esm.js';
const params = new URLSearchParams(location.search);
const f = params.get('f') || '';
const doc = document.getElementById('doc');
const dl = document.getElementById('dl');
dl.href = encodeURI(f);
document.getElementById('prov').textContent = 'Source: ChatGPT Deep Research export (Sept 2025 – Jul 2026). Background context only — read alongside the Evidence Dossier; claims travel with their caveats and are not OTOS promises.';
if (!f) { doc.innerHTML = '<div class="err">No report specified.</div>'; }
else {
  fetch(encodeURI(f)).then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => {
      marked.setOptions({ gfm:true, breaks:false });
      doc.innerHTML = marked.parse(md);
      const h1 = doc.querySelector('h1');
      if (h1) document.title = h1.textContent + ' · OTOS';
    })
    .catch(e => { doc.innerHTML = '<div class="err">Could not load this report (' + e.message + '). It may only be available on the deployed hub.</div>'; });
}
</script>
</body>
</html>
